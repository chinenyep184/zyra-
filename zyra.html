<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zyra Fashion House - Inquiries & Appointments</title>
</head>

<body>

    <!-- Marquee Announcement -->
    <marquee behavior="scroll" direction="left">
         Check out our latest fashion collection! 
    </marquee>


    <!-- Inquiries and Appointments Section -->
    <section id="contact">

        <h1>Inquiries and Appointments</h1>

        <!-- Contact Information -->
        <div class="contact-info">
            <h2>Contact Us</h2>
            <p><strong>Phone:</strong> +234 XXX XXX XXXX</p>
            <p><strong>Email:</strong> info@zyrafashionhouse.com</p>
        </div>


        <!-- Inquiry Form -->
        <div class="inquiry-form">
            <h2>Send an Inquiry</h2>

            <form>
                <label for="name">Full Name:</label><br>
                <input type="text" id="name" name="name" required><br><br>

                <label for="email">Email Address:</label><br>
                <input type="email" id="email" name="email" required><br><br>

                <label for="message">Your Inquiry:</label><br>
                <textarea id="message" name="message" rows="5"></textarea><br><br>

                <button type="submit">Submit Inquiry</button>
            </form>
        </div>


        <!-- Appointment Booking Form -->
        <div class="appointment-form">
            <h2>Book an Appointment</h2>

            <form>
                <label for="client-name">Full Name:</label><br>
                <input type="text" id="client-name" name="client-name" required><br><br>

                <label for="phone">Phone Number:</label><br>
                <input type="tel" id="phone" name="phone" required><br><br>

                <label for="date">Preferred Date:</label><br>
                <input type="date" id="date" name="date"><br><br>

                <label for="time">Preferred Time:</label><br>
                <input type="time" id="time" name="time"><br><br>

                <button type="submit">Book Appointment</button>
            </form>
        </div>

    </section>

</body>
</html>
